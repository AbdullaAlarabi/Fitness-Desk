<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#061414" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Fitness Desk" />
    <link rel="apple-touch-icon" href="./media/brand/fitness_desk_app_icon.png" />
    <link rel="icon" type="image/png" href="./media/brand/fitness_desk_app_icon.png" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #d2d3ce;
      }

      .fd-boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #d2d3ce;
      }

      .fd-boot__panel {
        width: min(100%, 320px);
        border: 1px solid rgba(6, 20, 20, 0.12);
        border-radius: 28px;
        background: #e9ebe6;
        padding: 16px;
        box-shadow: 0 18px 48px rgba(6, 20, 20, 0.08);
      }

      .fd-boot__image {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 20px;
      }

      .fd-boot__label {
        margin: 12px 0 0;
        color: #061414;
        font:
          600 12px/1.4 system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        letter-spacing: 0.18em;
        text-align: center;
        text-transform: uppercase;
      }
    </style>
    <title>Fitness Desk</title>
  </head>
  <body>
    <div id="root">
      <div class="fd-boot" aria-label="Fitness Desk loading screen">
        <div class="fd-boot__panel">
          <img
            class="fd-boot__image"
            src="./media/brand/fitness_desk_splash_screen.png"
            alt="Fitness Desk splash screen"
          />
          <p class="fd-boot__label">Loading Fitness Desk</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
